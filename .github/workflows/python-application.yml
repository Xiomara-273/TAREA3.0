name: python-application

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# Permisos necesarios para escribir y publicar paquetes en el registro de GitHub (GHCR)
permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    # 1. Descargar el código fuente
    - name: Descargar codigo fuente
      uses: actions/checkout@v4

    # 2. Configurar el entorno de Python
    - name: Configurar Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    # 3. Instalar dependencias
    - name: Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # 4. Ejecutar pruebas automatizadas
    - name: Ejecutar pruebas automatizadas (pytest)
      run: |
        pytest test_app.py -v

    # 5. Ejecutar la aplicación
    - name: Ejecutar la aplicacion en el Runner
      run: |
        python app.py

    # 6. Simular una fase de despliegue
    - name: Simular fase de despliegue continuo
      run: |
        echo "Iniciando fase de despliegue en entorno de Staging..."
        echo "Despliegue simulado exitosamente."

    # 7. Autenticarse en GitHub Container Registry (GHCR)
    - name: Autenticarse en GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

   # 8. Construir y publicar la imagen Docker con tu usuario fijo
    - name: Construir y Publicar Imagen Docker
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: |
          ghcr.io/xiomara-273/ejercicio:3.0.0